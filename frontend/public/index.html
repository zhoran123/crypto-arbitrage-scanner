<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="FlashArb — Real-time crypto arbitrage scanner. 8 exchanges, 700+ pairs, instant Telegram alerts." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <title>FlashArb — Cross-Exchange Arbitrage Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #08090e;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { color: inherit; }
    ::selection { background: rgba(14,165,233,0.35); color: #fff; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(14,165,233,0.25); }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 4px; background: rgba(14,165,233,0.1); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #0ea5e9;
      box-shadow: 0 0 10px rgba(14,165,233,0.4);
      border: 2px solid #08090e;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #0ea5e9; border: 2px solid #08090e; cursor: pointer;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes meshMove {
      0% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.05); }
      66% { transform: translate(-20px,20px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }

    tr { transition: background 0.15s; }
    button { transition: all 0.2s; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
